<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>NEON Voice Mesh</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#020702;
  color:#00ff99;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
  radial-gradient(circle at 20% 20%, rgba(0,255,120,0.15), transparent 40%),
  radial-gradient(circle at 80% 70%, rgba(0,255,120,0.10), transparent 40%);
  animation:bg 6s infinite alternate;
  z-index:-1;
}

@keyframes bg{
  from{
    transform:scale(1);
  }
  to{
    transform:scale(1.1);
  }
}

.box{
  width:360px;
  margin:15px auto;
  padding:15px;
  border-radius:12px;
  border:1px solid #00ff99;
  background:rgba(0,0,0,0.6);
  box-shadow:0 0 20px #00ff99;
}

h2{
  text-align:center;
  text-shadow:0 0 12px #00ff99;
}

input,button{
  width:95%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#001a10;
  color:#00ff99;
  box-shadow:0 0 10px #00ff99;
}

button:hover{
  cursor:pointer;
  transform:scale(1.03);
}

#status{
  font-weight:bold;
  text-shadow:0 0 10px #00ff99;
}

.user{
  padding:8px;
  margin:5px;
  border:1px solid #00ff99;
  border-radius:8px;
}

#incoming{
  display:none;
}

#debug{
  height:220px;
  overflow-y:auto;
  background:#000;
  color:#00ff99;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  font-family:monospace;
  border:1px solid #00ff99;
  white-space:pre-wrap;
}

</style>
</head>

<body>

<h2>⚡ NEON VOICE MESH</h2>

<div class="box">
Status:
<div id="status">Idle</div>
</div>

<div class="box">

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

</div>

<div class="box">

Your Identity:
<div id="myId">---</div>

</div>

<div class="box">

<input id="callTo" placeholder="Username to call">

<button onclick="callUser()">Call</button>
<button onclick="endCall()">End Call</button>

</div>

<div class="box" id="incoming">

<h3>📞 Incoming Call</h3>

<div id="callerName"></div>

<button onclick="acceptCall()">Receive Call</button>

</div>

<div class="box">

<b>Known Users</b>

<div id="network"></div>

</div>





<div class="box">

<b>NETWORK STRENGTH</b>

  <div id="wifiText">
  Checking...
  </div>

<div style="
height:20px;
background:#111;
border-radius:10px;
overflow:hidden;
margin-top:10px;
">

  <div id="wifiBar" style="
  width:100%;
  height:100%;
  background:#00ff99;
  transition:0.5s;
"></div>

</div>



</div>







<div class="box">

<b>LIVE DEBUG CONSOLE</b>

<div id="debug"></div>

</div>

<audio id="remoteAudio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>

const SERVER =
  "https://websitespeaks.onrender.com";

let peer = null;
let localStream = null;
let currentCall = null;
let loggedIn = false;
let myUsername = "";
let onlineUsers = {};




  const savedUser =
    localStorage.getItem("loggedUser");

  if(savedUser){

    myUsername = savedUser;

    loggedIn = true;

    localStorage.setItem(
      "accountUsername",
      myUsername
    );

    document.getElementById(
      "myId"
    ).innerText = myUsername;

    window.addEventListener("load",async()=>{

      debug("RESTORING SESSION => " + myUsername);

      await startPeer();

    });

  }




let incomingCall = null;

let knownUsers =
  JSON.parse(localStorage.getItem("knownUsers") || "[]");

function debug(msg){

  console.log(msg);

  const debugBox =
    document.getElementById("debug");

  const time =
    new Date().toLocaleTimeString();

  debugBox.innerHTML +=
    "[" + time + "] " + msg + "\\n";

  debugBox.scrollTop =
    debugBox.scrollHeight;

}

function setStatus(text){

  debug("STATUS => " + text);

  document.getElementById("status")
  .innerText = text;

}

function renderUsers(){

  const network =
    document.getElementById("network");

  network.innerHTML = "";

  knownUsers.forEach(user => {

    const div =
      document.createElement("div");

    div.className = "user";

    div.innerText = user;

    network.appendChild(div);

  });

}

function saveUsers(){

  localStorage.setItem(
    "knownUsers",
    JSON.stringify(knownUsers)
  );

}

async function signup(){

  const username =
    document.getElementById("username")
    .value
    .trim()
    .toLowerCase();

  const password =
    document.getElementById("password")
    .value;

  debug("Attempting signup...");
  debug("SERVER = " + SERVER);
  debug("USERNAME = " + username);

  if(!username || !password){

    alert("Enter username and password");

    return;

  }

  setStatus("🟡 Registering...");

  try{

    const res =
      await fetch(SERVER + "/signup",{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          username,
          password
        })
      });

    debug("HTTP STATUS = " + res.status);

    const data = await res.json();

    debug("SERVER RESPONSE:");
    debug(JSON.stringify(data,null,2));

    if(data.success){

      setStatus("✅ Registered");

    }else{

      setStatus("❌ " + data.message);

    }

  }catch(err){

    console.log(err);

    debug("SIGNUP ERROR:");
    debug(err.toString());

    setStatus("❌ Signup failed");

  }

}

async function login(){

  const username =
    document.getElementById("username")
    .value
    .trim()
    .toLowerCase();

  const password =
    document.getElementById("password")
    .value;

  debug("Attempting login...");
  debug("USERNAME = " + username);

  if(!username || !password){

    alert("Enter username and password");

    return;

  }

  setStatus("🔐 Logging in");

  try{

    const res =
      await fetch(SERVER + "/login",{
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          username,
          password
        })
      });

    debug("HTTP STATUS = " + res.status);

    const data = await res.json();

    debug("LOGIN RESPONSE:");
    debug(JSON.stringify(data,null,2));

    if(!data.success){

      setStatus("❌ " + data.message);

      return;

    }

    setStatus("Authenticating...");

    myUsername = data.username;

    document.getElementById("myId")
    .innerText = myUsername;

    loggedIn = true;
    localStorage.setItem(
      "loggedUser",
      myUsername
    );

    await startPeer();

  }catch(err){

    debug("LOGIN ERROR:");
    debug(err.toString());

    setStatus("❌ Login failed");

  }

}




async function monitorConnection(){

  try{

    const start = performance.now();

    await fetch(
      SERVER + "/health?t=" + Date.now(),
      {
        cache:"no-store"
      }
    );

    const latency =
      performance.now() - start;

    let strength = 100;

    if(latency > 1000){

      strength = 20;

    }else if(latency > 700){

      strength = 40;

    }else if(latency > 400){

      strength = 60;

    }else if(latency > 200){

      strength = 80;

    }

    const bar =
      document.getElementById("wifiBar");

    const text =
      document.getElementById("wifiText");

    bar.style.width =
      strength + "%";

    if(strength > 80){

      text.innerText =
        "🟢 Excellent Connection";

    }else if(strength > 60){

      text.innerText =
        "🟡 Good Connection";

    }else if(strength > 40){

      text.innerText =
        "🟠 Weak Connection";

    }else{

      text.innerText =
        "🔴 Poor Connection";

    }

  }catch(err){

    document.getElementById(
      "wifiBar"
    ).style.width = "5%";

    document.getElementById(
      "wifiText"
    ).innerText =
      "❌ Offline";

    debug("NETWORK LOST");

    if(peer){

      try{

        peer.reconnect();

      }catch(e){}

    }

  }

}

setInterval(
  monitorConnection,
  4000
);

monitorConnection();




function logout(){

  debug("Logging out");

  localStorage.removeItem(
    "loggedUser"
  );

  loggedIn = false;

  myUsername = "";

  if(currentCall){

    currentCall.close();

  }

  if(peer){

    try{
      peer.destroy();
    }catch(e){}

  }

  peer = null;

  document.getElementById(
    "myId"
  ).innerText = "---";

  setStatus("Logged out");

}




async function startPeer(){

  if(peer){

    try{
      peer.destroy();
    }catch(e){}

    peer = null;

  }

  try{

    debug("Requesting microphone access...");

    if(!localStream){

      localStream =
        await navigator.mediaDevices.getUserMedia({
          audio:true
        });

    }

    debug("Microphone granted");

    const peerId = myUsername;

    peer = new Peer(peerId,{
      host:"websitespeaks.onrender.com",
      secure:true,
      port:443,
      path:"/peerjs"
    });

    debug("Starting PeerJS...");

    peer.on("open",async(id)=>{

      debug("PEER OPENED => " + id);

      loggedIn = true;

      localStorage.setItem(
        "loggedUser",
        myUsername
      );

      localStorage.setItem(
        "peerId",
        id
      );

      await fetch(
        SERVER + "/active",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            username:myUsername,
            peerId:id
          })
        }
      );

      setStatus("🟢 Logged in");

      setTimeout(()=>{

        setStatus("📞 Ready state");

      },1000);

      updateOnlineStatus();

    });







    peer.on("disconnected",()=>{

      debug("PEER DISCONNECTED");

      setStatus("⚠ Weak connection reconnecting...");

      setTimeout(()=>{

        try{

          peer.reconnect();

        }catch(err){

          debug("Reconnect failed");

          startPeer();

        }

      },3000);

    });

    peer.on("close",()=>{

      debug("PEER CLOSED");

      setStatus("⚠ Connection closed");

    });

    peer.on("error",err=>{

      debug("PEER ERROR:");
      debug(JSON.stringify(err));

      if(
        err.type === "network" ||
        err.type === "server-error" ||
        err.type === "socket-error"
      ){

        setStatus("⚠ Weak internet reconnecting...");

        setTimeout(()=>{

          startPeer();

        },4000);

      }



      if(err.type === "unavailable-id"){

        debug("USERNAME ALREADY ACTIVE");

        setStatus("⚠ Already logged in elsewhere");

        return;

      }



    });

    peer.on("call",call=>{

      debug("INCOMING CALL FROM => " + call.peer);

      incomingCall = call;

      document.getElementById(
        "incoming"
      ).style.display = "block";

      document.getElementById(
        "callerName"
      ).innerText =
        "📞 Ringing from: " + call.peer;

      setStatus("📞 Incoming Call");

    });

  }catch(err){

    debug("MIC ERROR:");
    debug(err.toString());

    setStatus("❌ Microphone denied");

  }



}



async function updateOnlineStatus(){

  try{

    await fetch(
      SERVER + "/health"
    );

    document.getElementById(
      "wifiText"
    ).innerText = "Strong";

    document.getElementById(
      "wifiBar"
    ).style.width = "100%";

  }catch(err){

    document.getElementById(
      "wifiText"
    ).innerText = "Weak";

    document.getElementById(
      "wifiBar"
    ).style.width = "30%";

  }

}



function acceptCall(){

  if(!incomingCall) return;

  debug("Accepting call...");

  incomingCall.answer(localStream);

  currentCall = incomingCall;

  setStatus("📞 Call Connected");

  incomingCall.on("stream", remoteStream => {

    debug("Receiving remote stream");

    document.getElementById("remoteAudio")
    .srcObject = remoteStream;

  });

  document.getElementById("incoming")
  .style.display = "none";

}




async function callUser(){

  if(!loggedIn){

    setStatus("❌ Login required");

    return;

  }

  if(!peer){

    setStatus("❌ Peer unavailable");

    return;

  }

  const username =
    document.getElementById("callTo")
    .value
    .trim()
    .toLowerCase();

  if(!username){

    alert("Enter username");

    return;

  }

  debug("LOOKING UP USER => " + username);

  try{

    const res =
      await fetch(
        SERVER +
        "/active/" +
        username
      );

    const data =
      await res.json();

    if(!data.peerId){

      setStatus("❌ User offline");

      return;

    }

    debug(
      "FOUND PEER => " +
      data.peerId
    );

    const call =
      peer.call(
        data.peerId,
        localStream
      );

    currentCall = call;

    setStatus(
      "📞 Calling " + username
    );

    call.on("stream",stream=>{

      debug("CALL CONNECTED");

      document.getElementById(
        "remoteAudio"
      ).srcObject = stream;

      setStatus("📞 In Call");

    });

    call.on("close",()=>{

      setStatus("Call ended");

    });

    call.on("error",(err)=>{

      debug("CALL ERROR");
      debug(err.toString());

      setStatus("❌ Call failed");

    });

  }catch(err){

    debug("CALL FAILED");
    debug(err.toString());

    setStatus("❌ Connection error");

  }

}

function endCall(){

  debug("Ending call");

  if(currentCall){

    currentCall.close();

  }

  currentCall = null;

  document.getElementById("remoteAudio")
  .srcObject = null;

  setStatus("Idle");

}

window.onerror = function(msg,url,line,col,error){

  debug("WINDOW ERROR:");
  debug(msg);

};



renderUsers();

</script>

</body>
</html>
