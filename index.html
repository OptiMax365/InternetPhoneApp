<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>NEON Voice Mesh</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#040804;
  color:#00ff99;
}

.box {
  width:340px;
  margin:15px auto;
  padding:15px;
  border:1px solid #00ff99;
  border-radius:12px;
  background:rgba(0,0,0,0.65);
}

input, button {
  padding:10px;
  margin:5px;
  border:none;
  background:#001a10;
  color:#00ff99;
}

button:hover { transform:scale(1.05); }

.user {
  border:1px solid #00ff99;
  padding:5px;
  margin:4px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">⚡ NEON VOICE MESH</h2>

<div class="box">
  Status: <span id="status">OFFLINE</span>
</div>

<!-- AUTH BOX (WILL HIDE AFTER LOGIN) -->
<div class="box" id="authBox">
  <input id="name" placeholder="Username (10+ chars)" />
  <br/>
  <button onclick="signup()">Sign Up</button>
  <button onclick="signin()">Sign In</button>
</div>

<!-- ONLINE UI -->
<div class="box" id="onlineUI" style="display:none;">
  Your ID: <span id="myId"></span>
</div>

<div class="box">
  <b>Online Users</b>
  <div id="network"></div>
</div>

<div class="box">
  <button onclick="endCall()">End Call</button>
</div>

<audio id="audio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>

let peer;
let ws;
let stream;
let username;
let activeCall;
let incoming = null;

/* ==================== */
/* CONNECT WS */
/* ==================== */

function connectWS(){

  ws = new WebSocket(
    (location.protocol==="https:"?"wss":"ws") +
    "://" + location.host
  );

  ws.onmessage = (msg)=>{

    const data = JSON.parse(msg.data);

    if(data.type==="users"){
      renderUsers(data.users);
    }

    if(data.type==="error") alert(data.message);
    if(data.type==="ok") setStatus(data.message);

    if(data.type==="incoming-call"){
      incoming = data;
      showIncoming(data.from);
      setStatus("📳 RINGING...");
    }

    if(data.type==="call-start"){
      setStatus("🔵 ON CALL");
    }

    if(data.type==="call-ended"){
      setStatus("📴 Call ended");
      if(activeCall) activeCall.close();
    }
  };
}

/* ==================== */
/* SIGNUP */
/* ==================== */

function signup(){

  username = getName();

  ws.send(JSON.stringify({
    type:"signup",
    username
  }));
}

/* ==================== */
/* SIGNIN */
/* ==================== */

async function signin(){

  username = getName();

  stream = await navigator.mediaDevices.getUserMedia({audio:true});

  peer = new Peer(username);

  peer.on("open",()=>{

    ws.send(JSON.stringify({
      type:"signin",
      username,
      peerId: username
    }));

    /* HIDE AUTH UI */
    document.getElementById("authBox").style.display="none";
    document.getElementById("onlineUI").style.display="block";

    document.getElementById("myId").innerText = username;

    setStatus("🟢 ONLINE");
  });

  peer.on("call",(call)=>{

    call.answer(stream);
    activeCall = call;

    call.on("stream",(remote)=>{
      document.getElementById("audio").srcObject = remote;
    });
  });
}

/* ==================== */
/* CALL USER */
/* ==================== */

function callUser(id){

  ws.send(JSON.stringify({
    type:"call-request",
    from:username,
    to:id
  }));

  activeCall = peer.call(id, stream);
}

/* ==================== */
/* ACCEPT */
/* ==================== */

function acceptCall(){

  ws.send(JSON.stringify({
    type:"accept-call",
    from:username,
    to:incoming.from
  }));

  removeIncoming();
}

/* ==================== */
/* REJECT */
/* ==================== */

function rejectCall(){

  ws.send(JSON.stringify({
    type:"reject-call",
    to:incoming.from
  }));

  removeIncoming();
}

/* ==================== */
/* END CALL */
/* ==================== */

function endCall(){

  if(activeCall) activeCall.close();

  ws.send(JSON.stringify({
    type:"end-call",
    from:username,
    to:incoming?.from
  }));

  setStatus("Idle");
}

/* ==================== */
/* UI */
/* ==================== */

function getName(){
  return document.getElementById("name").value.trim();
}

function setStatus(t){
  document.getElementById("status").innerText=t;
}

function renderUsers(users){

  const box=document.getElementById("network");
  box.innerHTML="";

  users.forEach(u=>{

    if(u.username===username) return;

    const div=document.createElement("div");
    div.className="user";
    div.innerText=u.username;

    div.onclick=()=>callUser(u.peerId);

    box.appendChild(div);
  });
}

/* ==================== */
/* INCOMING UI */
/* ==================== */

function showIncoming(from){

  const div=document.createElement("div");
  div.id="incoming";
  div.style=`
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:black;
    border:2px solid #00ff99;
    padding:15px;
  `;

  div.innerHTML=`
    📳 Incoming Call: <b>${from}</b><br><br>
    <button onclick="acceptCall()">Accept</button>
    <button onclick="rejectCall()">Reject</button>
  `;

  document.body.appendChild(div);
}

function removeIncoming(){
  const el=document.getElementById("incoming");
  if(el) el.remove();
}

/* ==================== */

connectWS();

</script>

</body>
</html>
