<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script>
let ws;
let peer;
let stream;
let call;
let myPeerId;
let username;
let loggedIn = false;

/* ===================== */
/* STATUS */
/* ===================== */

function setStatus(t) {
  document.getElementById("status").innerText = t;
}

/* ===================== */
/* CONNECT WS */
/* ===================== */

function connectWS() {
  ws = new WebSocket(location.origin.replace("http", "ws"));

  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    if (data.type === "ok" && data.message === "logged-in") {
      onLoginSuccess();
    }

    if (data.type === "error") {
      alert(data.message);
    }

    if (data.type === "incoming-call") {
      setStatus("Incoming call from " + data.from);

      const c = peer.call(data.peerId, stream);
      call = c;

      c.on("stream", (rstream) => {
        document.getElementById("audio").srcObject = rstream;
        setStatus("In call");
      });
    }

    if (data.type === "call-ended") {
      endCall();
    }
  };
}

/* ===================== */
/* LOGIN FLOW */
/* ===================== */

async function start() {
  username = document.getElementById("name").value
    .replace(/[^a-zA-Z0-9]/g, "")
    .toLowerCase();

  if (!username) return alert("Enter username");

  connectWS();

  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  myPeerId = username + "_" + Math.random().toString(36).slice(2, 10);

  peer = new Peer(myPeerId);

  peer.on("open", () => {
    ws.send(JSON.stringify({
      type: "signin",
      username,
      peerId: myPeerId
    }));
  });
}

/* ===================== */
/* AFTER LOGIN */
/* ===================== */

function onLoginSuccess() {
  loggedIn = true;
  setStatus("Online (verified)");

  document.getElementById("myId").innerText = myPeerId;
}

/* ===================== */
/* CALLING */
/* ===================== */

function callUser() {
  if (!loggedIn) return alert("Not logged in");

  const target = document.getElementById("callTo").value.trim();
  if (!target) return;

  ws.send(JSON.stringify({
    type: "call-request",
    from: username,
    to: target
  }));
}

/* ===================== */
/* END CALL */
/* ===================== */

function endCall() {
  if (call) call.close();
  call = null;
  document.getElementById("audio").srcObject = null;

  ws.send(JSON.stringify({
    type: "end-call",
    from: username
  }));

  setStatus("Idle");
}
</script>
